# Report both halves' battery levels to the host
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=900

# Deep sleep after 5 min idle
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# Lower BLE TX power to save battery (host is nearby)
CONFIG_BT_CTLR_TX_PWR_MINUS_4=y

# Full N-Key Rollover for gaming
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# ZMK Studio (live keymap editing over USB)
CONFIG_ZMK_STUDIO=y
